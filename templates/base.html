<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analógico Domingo</title>

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">

        <h1>Analógico Domingo</h1>

        <p>Archivo del programa</p>

    </div>

<nav>

    <a href="/">Inicio</a>
    <a href="/discos/">Discos</a>
    <a href="/programas/">Programas</a>

    {% if session.usuario %}

        <a href="/discos/nuevo">Agregar Disco</a>
        <a href="/programas/nuevo">Nuevo Programa</a>
        <a href="/logout">Cerrar sesión</a>

    {% else %}

        <a href="/login">Iniciar sesión</a>

    {% endif %}

</nav>

</header>

<main>

{% block contenido %}
{% endblock %}

</main>

<footer>

    Analógico Domingo © 2026

</footer>

</body>

</html>
